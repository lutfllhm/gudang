services:
  mysql:
    image: mysql:8.0
    container_name: iware-mysql-prod
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    networks:
      - iware-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: iware-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - iware-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: iware-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - APP_NAME=${APP_NAME}
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_CONNECTION_LIMIT=${DB_CONNECTION_LIMIT}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - JWT_REFRESH_EXPIRE=${JWT_REFRESH_EXPIRE}
      - ACCURATE_APP_KEY=${ACCURATE_APP_KEY}
      - ACCURATE_CLIENT_ID=${ACCURATE_CLIENT_ID}
      - ACCURATE_CLIENT_SECRET=${ACCURATE_CLIENT_SECRET}
      - ACCURATE_REDIRECT_URI=${ACCURATE_REDIRECT_URI}
      - ACCURATE_SIGNATURE_SECRET=${ACCURATE_SIGNATURE_SECRET}
      - ACCURATE_ACCESS_TOKEN=${ACCURATE_ACCESS_TOKEN}
      - ACCURATE_DATABASE_ID=${ACCURATE_DATABASE_ID}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FILE_MAX_SIZE=${LOG_FILE_MAX_SIZE}
      - LOG_FILE_MAX_FILES=${LOG_FILE_MAX_FILES}
      - AUTO_SYNC_ENABLED=${AUTO_SYNC_ENABLED}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS}
      - SYNC_BATCH_SIZE=${SYNC_BATCH_SIZE}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - mysql
      - redis
    networks:
      - iware-network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: iware-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - iware-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  iware-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
