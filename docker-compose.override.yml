# Docker Compose Override untuk Development
# File ini tidak akan digunakan di production
# Gunakan: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

version: '3.8'

services:
  backend:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev
    ports:
      - "5173:5173"

  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"
