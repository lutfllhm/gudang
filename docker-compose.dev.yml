version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: iware_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-iware_warehouse}
      MYSQL_USER: ${DB_USER:-iware}
      MYSQL_PASSWORD: ${DB_PASSWORD:-iware_password}
      TZ: 'UTC'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/update-password.sql:/docker-entrypoint-initdb.d/02-update-password.sql
    networks:
      - iware_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${DB_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: iware_redis
    restart: unless-stopped
    command: >
      sh -c "
      if [ -n \"${REDIS_PASSWORD}\" ]; then
        redis-server --requirepass ${REDIS_PASSWORD}
      else
        redis-server
      fi
      "
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iware_network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iware_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server Configuration
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      APP_NAME: ${APP_NAME:-iWare Warehouse}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Database Configuration
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-iware}
      DB_PASSWORD: ${DB_PASSWORD:-iware_password}
      DB_NAME: ${DB_NAME:-iware_warehouse}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_min_32_characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_key_here_min_32_characters}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-30d}
      
      # Accurate Online API Configuration
      ACCURATE_ACCOUNT_URL: ${ACCURATE_ACCOUNT_URL:-https://account.accurate.id}
      ACCURATE_API_URL: ${ACCURATE_API_URL:-https://public-api.accurate.id/api}
      ACCURATE_APP_KEY: ${ACCURATE_APP_KEY:-}
      ACCURATE_CLIENT_ID: ${ACCURATE_CLIENT_ID:-}
      ACCURATE_CLIENT_SECRET: ${ACCURATE_CLIENT_SECRET:-}
      ACCURATE_REDIRECT_URI: ${ACCURATE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      ACCURATE_SIGNATURE_SECRET: ${ACCURATE_SIGNATURE_SECRET:-}
      ACCURATE_ACCESS_TOKEN: ${ACCURATE_ACCESS_TOKEN:-}
      ACCURATE_DATABASE_ID: ${ACCURATE_DATABASE_ID:-}
      
      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:5000}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Sync Configuration
      AUTO_SYNC_ENABLED: ${AUTO_SYNC_ENABLED:-false}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
      SYNC_BATCH_SIZE: ${SYNC_BATCH_SIZE:-100}
      
      # Webhook Configuration
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-your_webhook_secret_here}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - iware_network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iware_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - iware_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  iware_network:
    driver: bridge

