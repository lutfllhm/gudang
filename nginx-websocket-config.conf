# ========================================
# Nginx Configuration untuk WebSocket
# File: /etc/nginx/sites-available/iwareid.com
# ========================================

# Upstream untuk backend
upstream backend_server {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Upstream untuk frontend
upstream frontend_server {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name iwareid.com www.iwareid.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iwareid.com www.iwareid.com;

    # SSL Configuration (sesuaikan dengan SSL cert Anda)
    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/iwareid.com-access.log;
    error_log /var/log/nginx/iwareid.com-error.log;

    # Max upload size
    client_max_body_size 10M;

    # ========================================
    # Backend API + WebSocket
    # ========================================
    location /api {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # WebSocket Support - PENTING!
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts untuk WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ========================================
    # Socket.IO WebSocket Endpoint
    # PENTING: Ini yang membuat WebSocket berfungsi!
    # ========================================
    location /socket.io/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # WebSocket Support - WAJIB!
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts untuk WebSocket - PENTING!
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Disable buffering untuk WebSocket
        proxy_buffering off;
    }

    # ========================================
    # Frontend (React/Vite)
    # ========================================
    location / {
        proxy_pass http://frontend_server;
        proxy_http_version 1.1;
        
        # WebSocket support untuk Vite HMR (development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache control
        proxy_cache_bypass $http_upgrade;
    }

    # ========================================
    # Static files (jika frontend di-build)
    # Uncomment jika frontend sudah production build
    # ========================================
    # location / {
    #     root /path/to/frontend/dist;
    #     try_files $uri $uri/ /index.html;
    #     
    #     # Cache static assets
    #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }
}

# ========================================
# CATATAN PENTING:
# ========================================
# 1. Ganti /path/to/your/fullchain.pem dengan path SSL cert Anda
# 2. Ganti /path/to/your/privkey.pem dengan path SSL key Anda
# 3. Sesuaikan port frontend (3000) jika berbeda
# 4. Sesuaikan port backend (5000) jika berbeda
# 5. Setelah edit, test config: sudo nginx -t
# 6. Restart Nginx: sudo systemctl restart nginx
