services:
  mysql:
    image: mysql:8.0
    container_name: iware-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Jasadenam66/
      MYSQL_DATABASE: iware_warehouse
      MYSQL_USER: iware_user
      MYSQL_PASSWORD: Jasadenam66/
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pJasadenam66/"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - iware-network

  redis:
    image: redis:7-alpine
    container_name: iware-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass Jasadenam66/
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Jasadenam66/", "ping"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - iware-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: iware-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      APP_NAME: iWare Warehouse
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: iware_user
      DB_PASSWORD: Jasadenam66/
      DB_NAME: iware_warehouse
      DB_CONNECTION_LIMIT: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: Jasadenam66/
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRE: 7d
      JWT_REFRESH_EXPIRE: 30d
      ACCURATE_APP_KEY: ${ACCURATE_APP_KEY}
      ACCURATE_CLIENT_ID: ${ACCURATE_CLIENT_ID}
      ACCURATE_CLIENT_SECRET: ${ACCURATE_CLIENT_SECRET}
      ACCURATE_REDIRECT_URI: https://iwareid.com/api/accurate/callback
      ACCURATE_SIGNATURE_SECRET: ${ACCURATE_SIGNATURE_SECRET}
      ACCURATE_ACCESS_TOKEN: ${ACCURATE_ACCESS_TOKEN:-}
      ACCURATE_DATABASE_ID: ${ACCURATE_DATABASE_ID:-}
      CORS_ORIGIN: https://iwareid.com,https://www.iwareid.com
      CORS_CREDENTIALS: true
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 500
      LOG_LEVEL: info
      LOG_FILE_MAX_SIZE: 20m
      LOG_FILE_MAX_FILES: 14d
      AUTO_SYNC_ENABLED: true
      SYNC_INTERVAL_SECONDS: 60
      SYNC_BATCH_SIZE: 50
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: EXAVITQu4vr4xnSDxMaL
      ELEVENLABS_MODEL: eleven_multilingual_v2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - iware-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: iware-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - iware-network

networks:
  iware-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_logs:
