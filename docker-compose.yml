services:
  mysql:
    image: mysql:8.0
    container_name: iware-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    networks:
      - iware-network

  redis:
    image: redis:7-alpine
    container_name: iware-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iware-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iware-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/logs:/app/logs
    depends_on:
      - mysql
      - redis
    networks:
      - iware-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iware-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - iware-network

networks:
  iware-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
